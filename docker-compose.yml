services:

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: multiview-server-mediamtx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro

  multiview-server:
    container_name: multiview-server
    build: .
    working_dir: /app
    restart: unless-stopped
    network_mode: host
    environment:
      - NODE_ENV=production
      - PORT=8080
      - TZ=${TZ:-America/Chicago}
      - MULTIVIEW_PUBLIC_URL=${MULTIVIEW_PUBLIC_URL:-http://172.16.2.85:8080}
      - MULTIVIEW_DATA_DIR=/app/data
      - MEDIAMTX_API_BASE=http://127.0.0.1:9997
      - MEDIAMTX_HLS_BASE=http://172.16.2.85:8888
    volumes:
      - ./src:/app
      - ./data:/app/data
      - ./logs:/app/logs
